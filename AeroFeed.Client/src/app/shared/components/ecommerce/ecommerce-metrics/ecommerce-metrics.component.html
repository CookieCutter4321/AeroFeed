<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 md:gap-6">
  <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6">
    <apx-chart
    [series]="chartOptions.series"
    [chart]="chartOptions.chart"
    [labels]="chartOptions.labels"
    [responsive]="chartOptions.responsive"></apx-chart>
  </div>
  <!-- Metric Item Start -->
  <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6">
    <div class="flex items-center justify-center w-12 h-12 bg-gray-100 rounded-xl dark:bg-gray-800" [innerHTML]="icons.boxIconLine| safeHtml">
    </div>
    <div class="flex items-end justify-between mt-5">
      <div>
        <span class="text-sm text-gray-500 dark:text-gray-400">Net sum of characters changed</span>

        @if (kafkaService.currentData$ | async; as data) {
        <h4 class="mt-2 font-bold text-gray-800 text-title-sm dark:text-white/90">{{data.netLength}}</h4>
        }
      </div>
    </div>
  </div>
  <!-- Metric Item End -->
</div>
