<div class="rounded-2xl border border-gray-200 bg-gray-100 dark:border-gray-800 dark:bg-white/[0.03]">
  <div class="px-5 pt-5 bg-white shadow-default rounded-2xl pb-11 dark:bg-gray-900 sm:px-6 sm:pt-6">
    <div class="flex justify-between">
      <div>
        <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
          Bot Traffic
        </h3>
        <p class="mt-1 text-gray-500 text-theme-sm dark:text-gray-400">
          The percentage of changes that are made by bot accounts
        </p>
      </div>
      <div class="relative inline-block">
        <button class="dropdown-toggle" (click)="toggleDropdown()">
          <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 size-6"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.2441 6C10.2441 5.0335 11.0276 4.25 11.9941 4.25H12.0041C12.9706 4.25 13.7541 5.0335 13.7541 6C13.7541 6.9665 12.9706 7.75 12.0041 7.75H11.9941C11.0276 7.75 10.2441 6.9665 10.2441 6ZM10.2441 18C10.2441 17.0335 11.0276 16.25 11.9941 16.25H12.0041C12.9706 16.25 13.7541 17.0335 13.7541 18C13.7541 18.9665 12.9706 19.75 12.0041 19.75H11.9941C11.0276 19.75 10.2441 18.9665 10.2441 18ZM11.9941 10.25C11.0276 10.25 10.2441 11.0335 10.2441 12C10.2441 12.9665 11.0276 13.75 11.9941 13.75H12.0041C12.9706 13.75 13.7541 12.9665 13.7541 12C13.7541 11.0335 12.9706 10.25 12.0041 10.25H11.9941Z" fill="currentColor"></path></svg>
        </button>
        
        <app-dropdown [isOpen]="isOpen" (close)="closeDropdown()" className="w-40 p-2">
          <app-dropdown-item (itemClick)="closeDropdown()"
            className="flex w-full font-normal text-left text-gray-500 rounded-lg hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
            View More
          </app-dropdown-item>
          <app-dropdown-item (itemClick)="closeDropdown()"
            className="flex w-full font-normal text-left text-gray-500 rounded-lg hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
            Delete
          </app-dropdown-item>
        </app-dropdown>
      </div>
    </div>
    <div class="relative">
      <div class="max-h-[330px]" id="chartDarkStyle">
        <apx-chart
          [series]="series"
          [chart]="chart"
          [plotOptions]="plotOptions"
          [fill]="fill"
          [stroke]="stroke"
          [labels]="labels"
          [colors]="colors"
        ></apx-chart>
      </div>
    </div>
  </div>

  <div class="flex items-center justify-center gap-5 px-6 py-3.5 sm:gap-8 sm:py-5">
    <div>
      <p class="mb-1 text-center text-gray-500 text-theme-xs dark:text-gray-400 sm:text-sm">
        Bots
      </p>
      <p class="flex items-center justify-center gap-1 text-base font-semibold text-gray-800 dark:text-white/90 sm:text-lg">
        @if (kafkaService.currentData$ | async; as data) {
          {{data.bots | number: '1.0-0'}}
        }
        <svg width="16" height="16" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" class="iconify iconify--twemoji"><ellipse fill="#F4900C" cx="33.5" cy="14.5" rx="2.5" ry="3.5"/><ellipse fill="#F4900C" cx="2.5" cy="14.5" rx="2.5" ry="3.5"/><path fill="#FFAC33" d="M34 19a1 1 0 01-1 1h-3a1 1 0 01-1-1v-9a1 1 0 011-1h3a1 1 0 011 1v9zM7 19a1 1 0 01-1 1H3a1 1 0 01-1-1v-9a1 1 0 011-1h3a1 1 0 011 1v9z"/><path fill="#FFCC4D" d="M28 5c0 2.761-4.478 4-10 4C12.477 9 8 7.761 8 5s4.477-5 10-5c5.522.0 10 2.239 10 5z"/><path fill="#F4900C" d="M25 4.083C25 5.694 21.865 7 18 7c-3.866.0-7-1.306-7-2.917s3.134-2.917 7-2.917c3.865.0 7 1.306 7 2.917z"/><path fill="#269" d="M30 5.5C30 6.881 28.881 7 27.5 7h-19C7.119 7 6 6.881 6 5.5S7.119 3 8.5 3h19A2.5 2.5.0 0130 5.5z"/><path fill="#55ACEE" d="M30 6H6A2 2 0 004 8v26h28V8a2 2 0 00-2-2z"/><path fill="#3B88C3" d="M35 33v-1a2 2 0 00-2-2H22.071l-3.364 3.364a.999.999.0 01-1.414.0L13.929 30H3a2 2 0 00-2 2v1c0 1.104-.104 2 1 2h32c1.104.0 1-.896 1-2z"/><circle fill="#FFF" cx="24.5" cy="14.5" r="4.5"/><circle fill="#DD2E44" cx="24.5" cy="14.5" r="2.721"/><circle fill="#FFF" cx="11.5" cy="14.5" r="4.5"/><path fill="#F5F8FA" d="M29 25.5A2.5 2.5.0 0126.5 28h-17a2.5 2.5.0 110-5h17a2.5 2.5.0 012.5 2.5z"/><path fill="#CCD6DD" d="M17 23h2v5h-2zm-5 0h2v5h-2zm10 0h2v5h-2zM7 25.5a2.5 2.5.0 002 2.45v-4.9A2.5 2.5.0 007 25.5zm20-2.45v4.899a2.5 2.5.0 000-4.899z"/><circle fill="#DD2E44" cx="11.5" cy="14.5" r="2.721"/></svg>
      </p>
    </div>
    <div class="w-px bg-gray-200 h-7 dark:bg-gray-800"></div>
    <div>
      <p class="mb-1 text-center text-gray-500 text-theme-xs dark:text-gray-400 sm:text-sm">
        Humans
      </p>
      <p class="flex items-center justify-center gap-1 text-base font-semibold text-gray-800 dark:text-white/90 sm:text-lg">
        @if (kafkaService.currentData$ | async; as data) {
          {{data.nonBots | number: '1.0-0'}}
        }
        <svg width="16" height="16" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" class="iconify iconify--twemoji"><path fill="#4289C1" d="M22 27H4a4 4 0 00-4 4v5h26v-5a4 4 0 00-4-4z"/><path fill="#2A6797" d="M21 32h1v4h-1zM4 32h1v4H4z"/><path fill="#FFDC5D" d="M10 22v6a3 3 0 106 0v-6h-6z"/><path fill="#4289C1" d="M29 36h-7l1-17h6z"/><path fill="#F9CA55" d="M31.541 15.443a1.286 1.286.0 00-1.517-.997L27.35 15H25a2 2 0 00-2 2v2h5a1.996 1.996.0 001.992-1.927l.355-.073H31c0-.074-.028-.144-.045-.216.444-.276.698-.799.586-1.341z"/><path fill="#FFDC5D" d="M36 16a1 1 0 00-1-1l-6 1h-5a1 1 0 00-1 1v2h6l6-2s1-.447 1-1zM4 5.938V17c0 4.971 4.029 9 9 9s9-4.029 9-9V6.25L4 5.938z"/><path fill="#C1694F" d="M9 22h8s-1 2-4 2-4-2-4-2z"/><path fill="#662113" d="M9 16a1 1 0 01-1-1v-1a1 1 0 012 0v1a1 1 0 01-1 1zm8 0a1 1 0 01-1-1v-1a1 1 0 012 0v1a1 1 0 01-1 1z"/><path fill="#C1694F" d="M14 19.5h-2a.5.5.0 010-1h2a.5.5.0 010 1z"/><path fill="#FFDC5D" d="M5.847 13.715c0 1.58-.801 2.861-1.788 2.861s-1.788-1.281-1.788-2.861.801-2.861 1.788-2.861 1.788 1.281 1.788 2.861zm17.882.0c0 1.58-.8 2.861-1.788 2.861s-1.788-1.281-1.788-2.861.8-2.861 1.788-2.861 1.788 1.281 1.788 2.861z"/><path fill="#FFAC33" d="M13 .823C5.981.823 2.861 5.507 2.861 9.411c0 3.903 1.343 4.986 1.56 3.903.78-3.903 3.12-5.101 3.12-5.101 4.68 3.904 3.9.781 3.9.781 4.679 4.684 2.34.0 2.34.0 1.56 1.562 6.239 1.562 6.239 1.562s.78 1.198 1.559 2.759c.78 1.562 1.56.0 1.56-3.903.0-3.905-3.9-8.589-10.139-8.589z"/></svg>
      </p>
    </div>
  </div>
</div>
